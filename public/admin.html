<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | Camaraderie Cafe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tealDark: '#083330',
                        tealLight: '#114D48',
                        goldWarm: '#D4AF37',
                        charcoal: '#1A2421',
                        cream: '#FBFBF9'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-cream font-sans text-charcoal min-h-screen">

    <!-- Header -->
    <header class="bg-tealDark text-white py-6 shadow-md border-b border-tealLight/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div>
                <h1 class="font-serif text-2xl font-bold tracking-wider text-goldWarm">CAMARADERIE</h1>
                <p class="text-xs uppercase tracking-widest text-stone-300">Reservation Manager Panel</p>
            </div>
            <button onclick="fetchReservations()" class="bg-tealLight border border-goldWarm/30 hover:bg-goldWarm hover:text-tealDark text-goldWarm font-semibold px-4 py-2 rounded-lg text-xs transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrows-rotate"></i> Refresh List
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <h2 class="font-semibold text-tealDark text-lg">Active Bookings</h2>
                <span id="booking-count" class="bg-tealLight text-white text-xs font-bold px-3 py-1 rounded-full">0 Bookings</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-stone-600 border-collapse">
                    <thead>
                        <tr class="bg-stone-100 text-stone-700 uppercase text-[10px] tracking-wider border-b border-stone-200">
                            <th class="py-4 px-6 font-bold">Customer Name</th>
                            <th class="py-4 px-6 font-bold">Phone Number</th>
                            <th class="py-4 px-6 font-bold">Booking Date</th>
                            <th class="py-4 px-6 font-bold">Event Type</th>
                            <th class="py-4 px-6 font-bold">Guests</th>
                            <th class="py-4 px-6 font-bold">Status</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-list">
                        <!-- Dynamic rows will be inserted here -->
                        <tr>
                            <td colspan="6" class="text-center py-12 text-stone-400">Loading reservations...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchReservations() {
            const listContainer = document.getElementById('reservations-list');
            const countBadge = document.getElementById('booking-count');

            try {
                const response = await fetch('/api/reservations');
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();

                countBadge.innerText = `${data.length} Booking${data.length === 1 ? '' : 's'}`;

                if (data.length === 0) {
                    listContainer.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center py-12 text-stone-400">
                                <i class="fa-regular fa-calendar text-4xl mb-2 block"></i>
                                No reservations found yet.
                            </td>
                        </tr>`;
                    return;
                }

                // Sort reservations by date (nearest first)
                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                listContainer.innerHTML = data.map(res => `
                    <tr class="border-b border-stone-100 hover:bg-stone-50/50 transition-colors">
                        <td class="py-4 px-6 font-semibold text-tealDark">${escapeHtml(res.name)}</td>
                        <td class="py-4 px-6">
                            <a href="tel:${res.phone}" class="text-tealLight hover:underline font-medium">
                                <i class="fa-solid fa-phone text-xs text-stone-400 mr-1"></i> ${escapeHtml(res.phone)}
                            </a>
                        </td>
                        <td class="py-4 px-6 font-medium">${formatDate(res.date)}</td>
                        <td class="py-4 px-6">
                            <span class="px-2.5 py-1 rounded text-xs font-semibold ${getBadgeStyle(res.event_type)}">
                                ${escapeHtml(res.event_type)}
                            </span>
                        </td>
                        <td class="py-4 px-6 font-bold">${res.guests}</td>
                        <td class="py-4 px-6">
                            <span class="text-emerald-600 font-semibold text-xs flex items-center gap-1">
                                <span class="h-2 w-2 rounded-full bg-emerald-500"></span> Received
                            </span>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                listContainer.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-12 text-red-500">
                            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2 block"></i>
                            Failed to load reservations. Make sure your server is running.
                        </td>
                    </tr>`;
            }
        }

        // Helper: Formatting Dates nicely
        function formatDate(dateStr) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString('en-US', options);
        }

        // Helper: Style different event tags
        function getBadgeStyle(type) {
            switch(type) {
                case 'Birthday Party':
                    return 'bg-pink-100 text-pink-800';
                case 'Anniversary Celebration':
                    return 'bg-amber-100 text-amber-800';
                case 'Corporate Party':
                    return 'bg-blue-100 text-blue-800';
                default:
                    return 'bg-stone-100 text-stone-800';
            }
        }

        // Helper: Security escape
        function escapeHtml(string) {
            return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Initial fetch on page load
        window.onload = fetchReservations;
    </script>
</body>
</html>
